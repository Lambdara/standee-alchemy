<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Standee Alchemy</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Standee Alchemy</h1>
        <span id="itemCount">0 images</span>
      </div>

      <div class="actions">
        <input id="imageInput" type="file" accept="image/*" multiple hidden />
        <button id="chooseFiles" type="button">Add Images</button>
        <button id="generatePdf" type="button" disabled>Generate PDF</button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel controls-panel" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">Settings</h2>

        <div class="control-grid">
          <label>
            <span>New image width</span>
            <select id="defaultWidth">
              <option value="0.5">1/2 inch</option>
              <option value="1" selected>1 inch</option>
              <option value="2">2 inches</option>
              <option value="3">3 inches</option>
              <option value="4">4 inches</option>
            </select>
          </label>

          <label>
            <span>Margin</span>
            <input id="margin" type="number" min="0" max="1.5" step="0.05" value="0.25" />
          </label>

          <label>
            <span>Spacing</span>
            <input id="spacing" type="number" min="0" max="0.5" step="0.01" value="0.05" />
          </label>

          <label>
            <span>Render DPI</span>
            <select id="renderDpi">
              <option value="150">150</option>
              <option value="225" selected>225</option>
              <option value="300">300</option>
            </select>
          </label>
        </div>

        <div class="toggle-row">
          <label>
            <input id="allowRotate" type="checkbox" checked />
            <span>Rotate pieces while packing</span>
          </label>
          <label>
            <input id="drawGuides" type="checkbox" checked />
            <span>Print cut and fold guides</span>
          </label>
        </div>

        <button id="applyWidth" class="secondary" type="button">Apply Width To All</button>
      </section>

      <section class="panel list-panel" aria-labelledby="imagesTitle">
        <div class="panel-heading">
          <h2 id="imagesTitle">Images</h2>
          <button id="clearAll" class="link-button" type="button" disabled>Clear</button>
        </div>
        <div id="dropZone" class="drop-zone" role="button" tabindex="0">
          <strong>Drop images here</strong>
          <span>or click Add Images</span>
        </div>
        <div id="itemList" class="item-list">
          <div class="empty-state">Add images to begin.</div>
        </div>
      </section>

      <section class="panel output-panel" aria-labelledby="layoutTitle">
        <div class="panel-heading">
          <h2 id="layoutTitle">Layout</h2>
          <a id="downloadLink" class="download-link" hidden>Download PDF</a>
        </div>
        <div id="status" class="status">No images loaded.</div>
        <div id="layoutSummary" class="layout-summary"></div>
        <div id="pagePreview" class="page-preview"></div>
      </section>
    </main>
  </body>
</html>
